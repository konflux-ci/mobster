---
apiVersion: tekton.dev/v1
kind: Task

metadata:
  name: augment-component-sboms-ta
  labels:
    app.kubernetes.io/version: "0.2.0"
  annotations:
    tekton.dev/pipelines.minVersion: "0.12.1"
    tekton.dev/tags: sbom

spec:
  description: >-
    Update component-level SBOMs with release-time information, optionally
    upload them to Atlas and S3.
  params:
    - name: ociStorage
      description: The OCI repository where the Trusted Artifacts are stored.
      type: string
      default: "empty"

    - name: ociArtifactExpiresAfter
      description: Expiration date for the trusted artifacts created in the
        OCI repository. An empty string means the artifacts do not expire.
      type: string
      default: "1d"

    - name: trustedArtifactsDebug
      description: Flag to enable debug logging in trusted artifacts. Set to a non-empty string to enable.
      type: string
      default: ""

    - name: orasOptions
      description: oras options to pass to Trusted Artifacts calls
      type: string
      default: ""

    - name: sourceDataArtifact
      type: string
      description: Location of trusted artifacts to be used to populate data directory
      default: ""

    - name: dataDir
      description: The location where data will be stored
      type: string
      default: /var/workdir/release

    - name: taskGitUrl
      type: string
      description: The url to the git repo where the trusted artifact stepactions to be used are stored

    - name: taskGitRevision
      type: string
      description: The revision in the taskGitUrl repo to be used for trusted artifact stepactions

    - name: snapshotSpec
      type: string
      description: Path to the mapped snapshot spec.

    - name: atlasSecretName
      type: string
      description: >
        The name of the K8s secret containing the 'sso_account' and 'sso_token'
        keys used for Atlas OIDC authentication.

    - name: retryAWSSecretName
      type: string
      description: >
        The name of the K8s secret containing the 'atlas-aws-access-key-id' and
        'atlas-aws-secret-access-key' keys used for AWS S3 access.

    - name: retryS3Bucket
      type: string
      default: ""
      description: >
        The name of the S3 bucket used to store data for the retry mechanism.

    - name: atlasApiUrl
      type: string
      default: ""
      description: URL of the Atlas API host.

    - name: ssoTokenUrl
      description: URL of the SSO token issuer.
      default: ""
      type: string

    - name: augmentConcurrency
      description: |
        Maximum number of SBOMs that will be augmented concurrently. Higher
        limit will speed up execution for larger snapshots, but will have
        higher memory requirements.
      default: "8"
      type: string

    - name: uploadConcurrency
      description: |
        Maximum number of SBOMs that will be uploaded to Atlas concurrently.
        Higher limit will speed up execution for larger snapshots, but will
        have higher memory requirements.
      default: "8"
      type: string

    - name: resultsDirPath
      type: string
      description: Path to directory in the dataDir to store JSON task results to.

    - name: cosignSecretName
      type: string
      description: K8s secret name with a cosign signing key used for SBOM attestation.
      default: ""

    - name: attestationPubKey
      type: string
      description: K8s reference to a secret containing a key for verifying provenance attestations
      default: ""

    - name: releaseData
      type: string
      description: Path to the merged data file from collect-data in the dataDir.

    # Configuration parameters for keyless signing, if enabled.
    - name: defaultOIDCIssuer
      type: string
      description: A default OIDC issuer URL to be used for signing.
      default: ""
    - name: rekorExternalUrl
      type: string
      description: The external URL of the Rekor transparency log.
      default: ""
    - name: fulcioExternalUrl
      type: string
      description: The external URL of the Fulcio certificate authority.
      default: ""
    - name: tufExternalUrl
      type: string
      description: The external URL of the TUF repository.
      default: ""
    - name: buildIdentityRegexp
      type: string
      description: |
        A regular expression to extract build identity from the OIDC token claims, if applicable.
      default: ""


  results:
    - description: Produced trusted data artifact
      name: sourceDataArtifact
      type: string

  volumes:
    - name: workdir
      emptyDir: {}
    - name: retryAWSSecret
      secret:
        secretName: $(params.retryAWSSecretName)
        optional: true
    - name: cosignSecret
      secret:
        secretName: $(params.cosignSecretName)
        optional: true
    - name: oidc-token
      projected:
        sources:
          - serviceAccountToken:
              audience: sigstore
              # 30 minutes should be enough to finish this task
              expirationSeconds: 1800
              path: oidc-token

  stepTemplate:
    volumeMounts:
      - mountPath: /var/workdir
        name: workdir
    env:
      - name: IMAGE_EXPIRES_AFTER
        value: $(params.ociArtifactExpiresAfter)
      - name: "ORAS_OPTIONS"
        value: "$(params.orasOptions)"
      - name: "DEBUG"
        value: "$(params.trustedArtifactsDebug)"

  steps:
    - name: use-trusted-artifact
      ref:
        resolver: "git"
        params:
          - name: url
            value: $(params.taskGitUrl)
          - name: revision
            value: $(params.taskGitRevision)
          - name: pathInRepo
            value: stepactions/use-trusted-artifact/use-trusted-artifact.yaml
      params:
        - name: workDir
          value: $(params.dataDir)
        - name: sourceDataArtifact
          value: $(params.sourceDataArtifact)

    - name: process-component-sboms
      image: quay.io/konflux-ci/mobster:1.1.0-1773301450@sha256:6a483e6d285b3cace4792e0e4f8632fc9de2ec873f57708fd33d8986f9d33a99
      env:
        - name: MOBSTER_TPA_SSO_ACCOUNT
          valueFrom:
            secretKeyRef:
              name: $(params.atlasSecretName)
              key: sso_account
              optional: true
        - name: MOBSTER_TPA_SSO_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.atlasSecretName)
              key: sso_token
              optional: true
        - name: MOBSTER_TPA_SSO_TOKEN_URL
          value: $(params.ssoTokenUrl)
        - name: AWS_DEFAULT_REGION
          value: "us-east-1"
      volumeMounts:
        - name: retryAWSSecret
          mountPath: /etc/retryAWSSecret
          readOnly: true
        - name: cosignSecret
          mountPath: /etc/cosignSecret
          readOnly: true
      computeResources:
        limits:
          memory: 2Gi
        requests:
          memory: 2Gi
          cpu: 350m
      script: |
        #!/usr/bin/env bash
        set -euv
        # populate env vars from optional secrets of present
        declare -A aws_entries=(
          ["AWS_ACCESS_KEY_ID"]="atlas-aws-access-key-id"
          ["AWS_SECRET_ACCESS_KEY"]=atlas-aws-secret-access-key
        )
        for i in "${!aws_entries[@]}"; do
          filePath="/etc/retryAWSSecret/${array[$i]}"
          if [ -f "$filePath" ]; then
            export "$i"=$(cat "/etc/retryAWSSecret/${array[$i]}")
          fi
        done
        declare -A cosign_entries=(
          ["SIGN_KEY"]="SIGN_KEY"
          ["COSIGN_AWS_DEFAULT_REGION"]="AWS_DEFAULT_REGION"
          ["COSIGN_AWS_ACCESS_KEY_ID"]="AWS_ACCESS_KEY_ID"
          ["COSIGN_AWS_SECRET_ACCESS_KEY"]="AWS_SECRET_ACCESS_KEY"
        )
        for i in "${!aws_entries[@]}"; do
          filePath="/etc/cosignSecret/${array[$i]}"
          if [ -f "$filePath" ]; then
            export "$i"=$(cat "$filePath")
          fi
        done

        set +v
        set -x

        # This is a little fragile, ideally it would be just a param. It's here
        # for consistency with other tasks in release-service-catalog. The
        # script below will verify that the release_id has the correct format.
        release_id=$(dirname "$(params.snapshotSpec)")

        mobster_args=(
          --data-dir "$(params.dataDir)"
          --snapshot-spec "$(params.snapshotSpec)"
          --atlas-api-url "$(params.atlasApiUrl)"
          --retry-s3-bucket "$(params.retryS3Bucket)"
          --release-id "$release_id"
          --augment-concurrency "$(params.augmentConcurrency)"
          --upload-concurrency "$(params.uploadConcurrency)"
          --result-dir "$(params.resultsDirPath)"
          --release-data "$(params.releaseData)"
        )
        # Params are basically Bash commands, their value
        # has to be checked with -n. Env variables should
        # be checked with -v to not leak expanded secrets
        # through xtrace. Bash conditionals ([[) have to
        # be used instead of Shell conditionals ([) to use -v
        if [[ -n "$(params.defaultOIDCIssuer)" \
          && -n "$(params.rekorExternalUrl)" \
          && -n "$(params.fulcioExternalUrl)" \
          && -n "$(params.tufExternalUrl)" \
          && -n "$(params.buildIdentityRegexp)" \
        ]]; then
          # Keyless signing is used for augmentation
          cosign initialize --root "$(params.tufExternalUrl)/root.json" \
            --mirror "$(params.tufExternalUrl)"
          mobster_args+=(
            --oidc-token /var/run/sigstore/cosign/oidc-token
            --fulcio-url "$(params.fulcioExternalUrl)"
            --oidc-issuer "$(params.defaultOIDCIssuer)"
            --oidc-identity-pattern "$(params.buildIdentityRegexp)"
            --rekor-url "$(params.rekorExternalUrl)"
          )
        elif [[ -n "$(params.attestationPubKey)" \
          && -v SIGN_KEY \
          && -v COSIGN_AWS_DEFAULT_REGION \
          && -v COSIGN_AWS_ACCESS_KEY_ID \
          && -v COSIGN_AWS_SECRET_ACCESS_KEY
        ]]; then
          # Static key signing is used for augmentation
          mobster_args+=(
            --verify-key "$(params.attestationPubKey)"
            --sign-key "$SIGN_KEY"
          )
        fi
        process_component_sboms "${mobster_args[@]}"

    - name: create-trusted-artifact
      ref:
        resolver: "git"
        params:
          - name: url
            value: "$(params.taskGitUrl)"
          - name: revision
            value: "$(params.taskGitRevision)"
          - name: pathInRepo
            value: stepactions/create-trusted-artifact/create-trusted-artifact.yaml
      params:
        - name: ociStorage
          value: $(params.ociStorage)
        - name: workDir
          value: $(params.dataDir)
        - name: sourceDataArtifact
          value: $(results.sourceDataArtifact.path)
